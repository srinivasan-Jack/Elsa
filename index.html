<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Elsa ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e8,#ffecc7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.box{
    width:400px;
    max-width:90%;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    color:#ff4081;
}

p{
    margin:15px 0;
    font-size:20px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

#yes{
    background:#4CAF50;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#celebration{
    display:none;
    animation:fade .8s;
}

#celebration img{
    width:250px;
    border-radius:15px;
    margin:20px 0;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.5);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="box">

<div id="question">

<h1>Hi Elsa ❤️</h1>

<p>Miss You 💕</p>

<h2>Complete Panalamaaa? 🥺</h2>

</div>

<div id="buttons">

<button id="yes">Yes ❤️</button>

<button id="no">No 😅</button>

</div>

<div id="celebration"></div>

</div>

<script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");
const buttons=document.getElementById("buttons");
const celebration=document.getElementById("celebration");

let count=0;

yes.onclick=function(){

buttons.style.display="none";

celebration.innerHTML=`
<h1>💖 Love You Baby 💖</h1>

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<h2>😘 Miss You ❤️</h2>

<p>I Can't Wait To See You 🥰</p>

<div style="font-size:50px;">
😘🤗💕🌹❤️
</div>
`;

celebration.style.display="block";

}

function moveButton(){

count++;

if(count>=10){

showNoMessage();
return;

}

const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-60);

no.style.left=x+"px";
no.style.top=y+"px";

}

function showNoMessage(){

buttons.style.display="none";

celebration.innerHTML=`

<h1>🥰 Thank You Baby ❤️</h1>

<img src="https://media.giphy.com/media/l4FGpP4lxGGgK5CBW/giphy.gif">

<h2>I'm Ready For That Date 🌹😘</h2>

<p>See You Soon My Love ❤️</p>

<div style="font-size:50px;">
💋🥰💕🌹
</div>

`;

celebration.style.display="block";

}

no.addEventListener("mouseover",moveButton);

no.addEventListener("touchstart",function(e){

e.preventDefault();

moveButton();

});

no.addEventListener("click",function(e){

e.preventDefault();

showNoMessage();

});

</script>

</body>
</html>
